name: CI — client-sdk/typescript

on:
  push:
    branches: [main]
    paths:
      - "client-sdk/typescript/**"
      - ".github/workflows/client-sdk-typescript.yml"
  pull_request:
    paths:
      - "client-sdk/typescript/**"
      - ".github/workflows/client-sdk-typescript.yml"

concurrency:
  group: ci-ts-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: client-sdk/typescript

jobs:
  lint-typecheck:
    name: Lint + typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check

  test-node:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        node: [20, 22, 24]
        include:
          - os: macos-14
            node: 22
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install nats-server (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -L -o nats-server.tar.gz https://github.com/nats-io/nats-server/releases/download/v2.12.3/nats-server-v2.12.3-linux-amd64.tar.gz
          tar -xzf nats-server.tar.gz --strip-components=1
          sudo mv nats-server /usr/local/bin/
          nats-server --version
      - name: Install nats-server (macOS)
        if: runner.os == 'macOS'
        run: brew install nats-server
      - run: npm install
      - run: npm run test:unit
      - run: npm run test:integration

  test-bun:
    name: Bun ${{ matrix.bun }}
    strategy:
      fail-fast: false
      matrix:
        bun: ["1.2", "latest"]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}
      - name: Install nats-server
        run: |
          curl -L -o nats-server.tar.gz https://github.com/nats-io/nats-server/releases/download/v2.12.3/nats-server-v2.12.3-linux-amd64.tar.gz
          tar -xzf nats-server.tar.gz --strip-components=1
          sudo mv nats-server /usr/local/bin/
          nats-server --version
      - run: bun install
      - run: bun x vitest run test/unit
      - run: bun x vitest run test/integration
