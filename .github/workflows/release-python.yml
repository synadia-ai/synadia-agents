name: Release — client-sdk/python

# Publishes a new synadia-ai-agents release to PyPI when a tag matching
# `python-v*` is pushed. Tag prefix disambiguates releases in the
# monorepo (alongside e.g. `ts-v*` for the TypeScript SDK). Runs the
# full test matrix first and fails shut if anything is red — so
# `git push --tags` is a single-button release that still can't ship
# broken code.

on:
  push:
    tags:
      - "python-v*"

concurrency:
  group: release-python-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: client-sdk/python

jobs:
  verify:
    name: Verify (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      NATS_SERVER_VERSION: "2.12.7"
    steps:
      - uses: actions/checkout@v4

      - name: Install nats-server
        # Extract into the runner's auto-cleaned temp area so we don't leave the
        # unpacked `nats-server-v*-linux-amd64/` parent directory in
        # `client-sdk/python/` after the binary is `mv`'d out (the default
        # working-directory at job level is `client-sdk/python`).
        working-directory: ${{ runner.temp }}
        run: |
          curl -fsSL "https://github.com/nats-io/nats-server/releases/download/v${NATS_SERVER_VERSION}/nats-server-v${NATS_SERVER_VERSION}-linux-amd64.tar.gz" | tar xz
          sudo mv "nats-server-v${NATS_SERVER_VERSION}-linux-amd64/nats-server" /usr/local/bin/
          nats-server --version

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "client-sdk/python/uv.lock"
          python-version: ${{ matrix.python-version }}

      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src tests examples
      - run: uv run pytest -v

  publish:
    name: Publish to PyPI
    needs: verify
    runs-on: ubuntu-latest
    # Bind to the "pypi" environment — gates this job behind the env's
    # `python-v*` tag protection rule, and scopes the OIDC token issued
    # to GitHub for the trusted-publishing exchange with PyPI.
    environment: pypi
    permissions:
      contents: write  # softprops/action-gh-release creates the tag's GitHub Release
      id-token: write  # mints the OIDC token PyPI exchanges for a credential
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "client-sdk/python/uv.lock"
          python-version: "3.11"

      - name: Build sdist + wheel
        run: |
          uv build
          ls -lh dist/

      - name: Verify tag matches pyproject version
        run: |
          # Strip the `python-v` monorepo prefix before comparing.
          TAG_VERSION="${GITHUB_REF_NAME#python-v}"
          PKG_VERSION="$(uv run python -c 'import tomllib,sys; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag python-v$TAG_VERSION does not match pyproject version $PKG_VERSION"
            exit 1
          fi
          echo "Tag and pyproject.toml both at $PKG_VERSION."

      - name: Publish to PyPI
        # OIDC trusted publishing — no long-lived token. The pending
        # publisher on PyPI must reference owner=synadia-ai,
        # repo=synadia-agents, workflow=release-python.yml, env=pypi.
        # `packages-dir` resolves from $GITHUB_WORKSPACE; the job-level
        # `defaults.run.working-directory` does not apply to action inputs.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: client-sdk/python/dist/

      - name: Attach artifacts to GitHub release
        if: ${{ !cancelled() }}
        uses: softprops/action-gh-release@v2
        # `files:` globs resolve from $GITHUB_WORKSPACE (defaults.run.working-directory
        # does not apply to action inputs), so paths are given from the repo root.
        with:
          files: |
            client-sdk/python/dist/*.whl
            client-sdk/python/dist/*.tar.gz
          generate_release_notes: true
